name: Test APWorld
on:
  push:
    branches: [ pokecrystal*, future/*, test-ci ]
  pull_request:
    branches: [ pokecrystal*, future/* ]


jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: gerbiljames/ap-actions/ap-tests@copy-apworld-source
        with:
          apworld-path: worlds/pokemon_crystal_prerelease
          ap-version: '0.6.6'
          python-version: '3.13'
