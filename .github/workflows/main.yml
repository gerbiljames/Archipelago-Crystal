name: Fuzz apworld
on:
  pull_request:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: Eijebong/ap-actions/fuzz@main
        with:
          apworld-path: worlds/portal2
          ap-version: 'latest'
          python-version: '3.12'
          runs: 500
          yamls-per-run: 1
